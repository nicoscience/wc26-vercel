<style>
  :root{
    --white:#FFFFFF; --ink:#262626; --blue:#0845FB; --orange:#FF9705;
    --blue-900:#0000c8; --blue-700:#0021d8; --blue-600:#003bef; --blue-300:#7182ff;
    --blue-100:#c7c9ff; --blue-050:#e9eaff;
    --orange-700:#E65004; --orange-300:#FFB64E; --orange-100:#FFE0B2; --orange-050:#FFF3E0;
    --g900:#262626; --g700:#434343; --g600:#555555; --g500:#7b7b7b; --g400:#9d9d9d;
    --g300:#c4c4c4; --g200:#d9d9d9; --g100:#e9e9e9; --g050:#f5f5f5;
    --win:#0845FB; --lose:#E65004; --draw:#7b7b7b; --ok:#0845FB; --miss:#E65004;
    --line:#d9d9d9;
    --radius:12px; --shadow:0 1px 2px rgba(38,38,38,.08),0 6px 18px rgba(38,38,38,.06);
    --font:Arial,"Helvetica Neue",Helvetica,sans-serif; --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--g050);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased}
  h1,h2,h3{margin:0;font-weight:900;letter-spacing:-.01em}

  header.top{background:var(--ink);color:#fff;position:sticky;top:0;z-index:40;box-shadow:0 2px 12px rgba(0,0,0,.18)}
  .top-inner{max-width:1400px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:15px}
  .logo{height:28px;display:block}
  .logo-fallback{font-weight:900;font-size:19px;letter-spacing:-.02em}.logo-fallback b{color:var(--orange)}
  .title-block{display:flex;flex-direction:column;line-height:1.12}
  .title-block .k{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue-300);font-weight:700}
  .title-block .t{font-size:16px;font-weight:900}
  .livepill{margin-left:auto;display:inline-flex;align-items:center;gap:7px;background:var(--orange);color:#fff;font-weight:700;font-size:12px;padding:4px 11px;border-radius:999px}
  .livepill .dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}
  @keyframes pulse{0%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
  .clock{color:var(--g300);font-size:12px;font-variant-numeric:tabular-nums;text-align:right;line-height:1.3}
  .clock b{color:#fff;font-size:14px;font-weight:700}

  /* leader banner */
  .lead-banner{max-width:1400px;margin:16px auto 0;padding:0 22px}
  .lead-inner{background:linear-gradient(135deg,var(--blue),var(--blue-700));color:#fff;border-radius:var(--radius);padding:15px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);flex-wrap:wrap}
  .lead-inner .crown{font-size:30px}
  .lead-inner .who{font-size:19px;font-weight:900;line-height:1.1}
  .lead-inner .sub{font-size:12px;color:var(--blue-100)}
  .lead-inner .mini{margin-left:auto;display:flex;gap:18px;flex-wrap:wrap}
  .lead-inner .mini .m{text-align:center}
  .lead-inner .mini .n{font-size:20px;font-weight:900;line-height:1}
  .lead-inner .mini .l{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue-100)}

  .stage-title{max-width:1400px;margin:22px auto 6px;padding:0 22px;display:flex;align-items:center;gap:10px}
  .stage-title h2{font-size:16px}
  .stage-title .hint{margin-left:auto;font-size:12px;color:var(--g500);display:flex;align-items:center;gap:6px}

  /* bracket */
  .bracket-scroll{overflow-x:auto;overflow-y:hidden;padding:6px 22px 26px;scroll-behavior:smooth}
  .bracket{position:relative;display:flex;gap:34px;min-width:1360px;margin:0 auto;max-width:1400px}
  svg.connectors{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0}
  .round{flex:1 1 0;min-width:236px;display:flex;flex-direction:column;position:relative;z-index:1}
  .round-title{font-size:13px;font-weight:900;text-align:center;color:var(--g700);padding:2px 0 18px;margin-bottom:4px}
  .round-body{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:10px}

  .mcard{background:#fff;border:1px solid var(--g100);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform .16s var(--ease),box-shadow .16s var(--ease)}
  .mcard.clickable{cursor:pointer}
  .mcard.clickable:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(38,38,38,.12)}
  .mcard.clickable:focus-visible{outline:3px solid var(--blue-300);outline-offset:2px}
  .mc-head{display:flex;justify-content:space-between;align-items:center;padding:6px 11px;background:var(--g050);border-bottom:1px solid var(--g100);font-size:11px;color:var(--g600);font-weight:700}
  .mc-head .st{font-weight:800}
  .st.live{color:var(--orange-700)} .st.fin{color:var(--g500)} .st.pen{color:var(--blue-700)}
  .trow{display:flex;align-items:center;gap:9px;padding:8px 11px}
  .trow+.trow{border-top:1px solid var(--g050)}
  .trow .flag{width:26px;height:19px;object-fit:cover;border-radius:2px;box-shadow:0 0 0 1px rgba(0,0,0,.08);flex:0 0 auto;background:var(--g100)}
  .trow .flag.ph{display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:var(--g400)}
  .trow .nm{font-weight:700;font-size:14px;line-height:1.1}
  .trow .own{font-size:11px;color:var(--g500);font-weight:400}
  .trow .sc{margin-left:auto;font-weight:900;font-size:16px;font-variant-numeric:tabular-nums;min-width:16px;text-align:right}
  .trow .pk{font-size:12px;color:var(--g500);font-weight:700;margin-left:4px}
  .trow .adv{color:var(--blue);margin-left:6px;font-size:12px}
  .trow.win .nm{color:var(--blue)}
  .trow.lose{opacity:.55}
  .trow.tbd .nm{color:var(--g400);font-weight:700}
  .prob-strip{height:5px;display:flex;background:var(--g100)}
  .prob-strip span{height:100%;transition:width .9s var(--ease)}
  .prob-strip .h{background:var(--win)} .prob-strip .d{background:var(--draw)} .prob-strip .a{background:var(--orange)}
  .tie{font-size:10px;color:var(--orange-700);background:var(--orange-050);padding:3px 8px;font-weight:700;text-align:center}
  .goalflash{animation:goalflash 1.6s var(--ease)}
  @keyframes goalflash{0%{background:var(--orange-050)}100%{background:#fff}}
  .scorebump{animation:bump .6s var(--ease);display:inline-block}
  @keyframes bump{0%{transform:scale(1)}30%{transform:scale(1.5);color:var(--orange)}100%{transform:scale(1)}}

  /* champion card */
  .champ{align-self:center;text-align:center;background:linear-gradient(135deg,#fff,var(--blue-050));border:2px solid var(--blue-100);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);min-width:200px}
  .champ .cup{font-size:34px}
  .champ .lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue-700);font-weight:800;margin-top:4px}
  .champ .nm{font-size:15px;font-weight:900;color:var(--g400);margin-top:6px}

  /* standings */
  .standings{max-width:1400px;margin:8px auto 0;padding:0 22px 60px}
  .standings h2{font-size:15px;margin-bottom:4px}
  .standings .sub{font-size:12px;color:var(--g500);margin-bottom:14px}
  table.sw{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  table.sw th{background:var(--g050);text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--g600);padding:11px 13px;border-bottom:1px solid var(--g100)}
  table.sw td{padding:11px 13px;border-bottom:1px solid var(--g100);font-size:13px;vertical-align:middle}
  table.sw tr:last-child td{border-bottom:0}
  table.sw tr.top{background:linear-gradient(90deg,var(--orange-050),transparent)}
  table.sw tr.top td:first-child{box-shadow:inset 3px 0 0 var(--orange)}
  .rk{font-weight:900;color:var(--g400);width:18px}
  .pn{font-weight:800}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px;margin-left:6px}
  .badge.hot{background:var(--orange);color:#fff;animation:glow 2s infinite}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(255,151,5,.5)}50%{box-shadow:0 0 0 6px rgba(255,151,5,0)}}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;border:1px solid var(--g200);background:#fff}
  .chip img{width:16px;height:12px;object-fit:cover;border-radius:1px}
  .chip.alive{border-color:var(--blue);background:var(--blue-050);color:var(--blue-700)}
  .chip.live{border-color:var(--orange);background:var(--orange-050);color:var(--orange-700)}
  .chip.out{border-color:var(--g200);color:var(--g400);text-decoration:line-through}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--g600)}
  .legend span{display:inline-flex;align-items:center;gap:6px}.legend .k{width:11px;height:11px;border-radius:3px}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(38,38,38,.55);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:60;padding:34px 16px;overflow:auto}
  .overlay.open{display:flex;animation:fade .25s var(--ease)}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:#fff;border-radius:18px;max-width:720px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.35);overflow:hidden}
  .mhead{background:linear-gradient(135deg,var(--ink),#111);color:#fff;padding:20px 22px;position:relative}
  .close{position:absolute;top:14px;right:16px;background:rgba(255,255,255,.14);border:0;color:#fff;width:32px;height:32px;border-radius:50%;font-size:17px;cursor:pointer}
  .close:hover{background:rgba(255,255,255,.28)}
  .mstage{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue-300);font-weight:700}
  .scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;margin-top:12px}
  .sb-team{text-align:center}.sb-team .flag{width:60px;height:44px;object-fit:cover;border-radius:4px;box-shadow:0 0 0 1px rgba(255,255,255,.2)}
  .sb-team .nm{font-weight:900;font-size:17px;margin-top:6px}.sb-team .own{font-size:12px;color:var(--blue-300);font-weight:700;margin-top:2px}
  .sb-score{font-size:42px;font-weight:900;font-variant-numeric:tabular-nums;text-align:center;white-space:nowrap}
  .sb-mid .st2{font-size:12px;color:var(--orange);font-weight:800;margin-top:6px}
  .mbody{padding:22px}.panel{margin-bottom:22px}
  .panel h3{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--g600);margin-bottom:12px}
  .gauge-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .gauge{position:relative;width:150px;height:150px;flex:0 0 auto}.gauge svg{transform:rotate(-90deg)}
  .gauge .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .gauge .center .big{font-size:25px;font-weight:900}.gauge .center .sm{font-size:11px;color:var(--g500);font-weight:700}

const ROUNDS=["Round of 32","Round of 16","Quarter-finals","Semi-finals","Final"];
const byId=id=>MATCHES.find(m=>m.id===id);
let STAT_MATCHES=[];   // all games (group+knockout) used for sweepstakes scoring
let GROUPS=null;       // group-stage tables (only when live data is present)
const SHOW_GROUPS=false;  // set true to show the group-stage tables; false = final phase only

/* winner of a completed match */
function winnerOf(m){
 if(!m||!m.home||!m.away) return null;
 if(m.status==="ft"||m.status==="aet") return m.hg>m.ag?m.home:m.ag>m.hg?m.away:null;
 if(m.status==="pens"){const ph=m.pens.home.filter(Boolean).length,pa=m.pens.away.filter(Boolean).length;return ph>pa?m.home:m.away;}
 return null; // live/upcoming undecided
}
function loserOf(m){ const w=winnerOf(m); if(!w||!m||!m.home||!m.away) return null; return w===m.home?m.away:m.home; }
/* propagate winners (or losers, for 3rd-place) into feeder-based matches —
   only fill EMPTY slots, never overwrite real teams supplied by live data */
function resolveBracket(){
 MATCHES.forEach(m=>{ if(m.fa){ const f=m.losers?loserOf:winnerOf; if(m.home==null) m.home=f(byId(m.fa)); if(m.away==null) m.away=f(byId(m.fb)); }});
}

/* ===== win-chance model ===== */
function oddsFor(h,a){
 const d=(TEAMS[h]?.s??74)-(TEAMS[a]?.s??74);
 const eH=1/(1+Math.pow(10,-d/12));
 const draw=Math.max(.12,Math.min(.30,.28-Math.abs(d)*.004));
 return {home:(1-draw)*eH, draw, away:(1-draw)*(1-eH)};
}
function winProb(m){
 if(!m.home||!m.away) return null;
 const o=oddsFor(m.home,m.away);
 if(m.status==="up") return o;
 if(m.status==="ft"||m.status==="aet"){return m.hg>m.ag?{home:1,draw:0,away:0}:m.ag>m.hg?{home:0,draw:0,away:1}:{home:0,draw:1,away:0};}
 if(m.status==="pens"){const w=winnerOf(m);return w===m.home?{home:1,draw:0,away:0}:{home:0,draw:0,away:1};}
 const max=m.maxMin||90, rem=Math.max(0,(max-m.minute)/max), diff=m.hg-m.ag;
 const preTilt=Math.log((o.home+.02)/(o.away+.02));
 const adv=diff*(2.3-1.5*rem)+preTilt*rem, hvA=1/(1+Math.exp(-adv));
 let draw=diff===0?(.18+.6*(1-rem)):Math.max(.02,(.28-.07*Math.abs(diff))*(.35+.65*rem));
 draw=Math.min(draw,.9); const nd=1-draw;
 return {home:nd*hvA, draw, away:nd*(1-hvA)};
}
const pct=x=>Math.round(x*100);

/* ===== sweepstakes standings ===== */
function teamStats(country){
 let wins=0,out=false,live=false,ahead=false;
 const src=(STAT_MATCHES&&STAT_MATCHES.length)?STAT_MATCHES:MATCHES.map(m=>({...m,knockout:true}));
 src.forEach(m=>{
   if(m.home!==country&&m.away!==country) return;
   const side=m.home===country?"home":"away";
   if(m.status==="live"||m.status==="ht"){live=true;const mine=side==="home"?m.hg:m.ag,opp=side==="home"?m.ag:m.hg;ahead=mine>opp;}
   else if(m.status==="ft"||m.status==="aet"||m.status==="pens"){const w=winnerOf(m);if(w===country)wins++;else if(w&&m.knockout)out=true;}
 });
 const state=out?"out":live?"live":wins>0?"alive":"none";
 return {wins,out,live,ahead,state};
}
function buildStandings(){
 const ppl={};
 Object.entries(OWNERS).forEach(([c,person])=>{
   const ts=teamStats(c);
   (ppl[person]=ppl[person]||{name:person,teams:[],wins:0,alive:0,live:0}).teams.push({country:c,...ts});
 });
 Object.values(ppl).forEach(p=>{p.teams.forEach(t=>{p.wins+=t.wins;if(!t.out)p.alive++;if(t.live)p.live++;});
   p.pts=p.wins*3;});
 return Object.values(ppl).sort((a,b)=>b.pts-a.pts||b.alive-a.alive||a.name.localeCompare(b.name));
}

const $=s=>document.querySelector(s);
function statusChip(m){
 if(m.status==="live") return `<span class="st live">● ${m.minute}'</span>`;
 if(m.status==="ft") return `<span class="st fin">Full time</span>`;
 if(m.status==="pens") return `<span class="st pen">Full time · pens</span>`;
 if(m.status==="aet") return `<span class="st fin">AET</span>`;

}
function teamRow(m,side){
 const c=side==="home"?m.home:m.away;
 if(!c) return `<div class="trow tbd"><span class="flag ph">🛡</span><div><div class="nm">To be decided</div></div></div>`;
 const decided=(m.status==="ft"||m.status==="aet"||m.status==="pens");
 const w=decided?winnerOf(m):null;
 const isWin=w===c, isLose=w&&w!==c;
 const sc = m.status==="up"?"":(side==="home"?m.hg:m.ag);
 let pk="";
 if(m.status==="pens"){const arr=side==="home"?m.pens.home:m.pens.away;pk=`<span class="pk">(${arr.filter(Boolean).length})</span>`;}
 return `<div class="trow ${isWin?'win':''} ${isLose?'lose':''}" data-side="${side}">
   ${flagImg(c)}
   <div><div class="nm">${short(c)}${isWin?'<span class="adv">▸</span>':''}</div><div class="own">${ownerOf(c)}</div></div>
   <span class="sc" data-side="${side}">${sc}</span>${m.status==="up"?"":pk}</div>`;
}
function matchCard(m){
 const div=document.createElement("div"); div.className="mcard"; div.id="card_"+m.id; div.dataset.id=m.id;
 const hasTeams=m.home&&m.away;
 const sameOwner=hasTeams&&OWNERS[m.home]&&OWNERS[m.home]===OWNERS[m.away];
 const _nz=fmtNZ(m.date);
 const _rl=m.label||ROUNDS[m.r].replace('Round of ','R');
 let html=`<div class="mc-head"><span>${_rl}${_nz?" · "+_nz:""}</span>${statusChip(m)}</div>
   ${teamRow(m,"home")}${teamRow(m,"away")}`;
 if((m.status==="live"||m.status==="up")&&hasTeams){
   const p=winProb(m);
   html+=`<div class="prob-strip" title="Win chance — blue ${short(m.home)} ${pct(p.home)}%, grey draw ${pct(p.draw)}%, orange ${short(m.away)} ${pct(p.away)}%">
     <span class="h" style="width:${pct(p.home)}%"></span><span class="d" style="width:${pct(p.draw)}%"></span><span class="a" style="width:${pct(p.away)}%"></span></div>`;
 }
 if(sameOwner) html+=`<div class="tie">🤝 both ${OWNERS[m.home]}'s teams</div>`;
 div.innerHTML=html;
 if(hasTeams){div.classList.add("clickable");div.tabIndex=0;div.setAttribute("role","button");
   div.setAttribute("aria-label",`${short(m.home)} versus ${short(m.away)}`);
   div.addEventListener("click",()=>openMatch(m.id));
   div.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();openMatch(m.id);}});}
 return div;
}
function renderBracket(){
 resolveBracket();
 const br=$("#bracket");

 ROUNDS.forEach((name,ri)=>{
   const col=document.createElement("div"); col.className="round";
   col.innerHTML=`<div class="round-title">${name}</div>`;
   const body=document.createElement("div"); body.className="round-body";
   const list=MATCHES.filter(m=>m.r===ri);
   list.forEach(m=>body.appendChild(matchCard(m)));
   col.appendChild(body); br.appendChild(col);
 });
 $("#liveCount").textContent=MATCHES.filter(m=>m.status==="live").length;
 requestAnimationFrame(drawConnectors);
}
/* SVG elbow connectors computed from real positions */
function drawConnectors(){
 const br=$("#bracket"), svg=$("#connectors");
 const w=br.scrollWidth, h=br.scrollHeight;
 svg.setAttribute("viewBox",`0 0 ${w} ${h}`); svg.setAttribute("width",w); svg.setAttribute("height",h);
 const b=br.getBoundingClientRect();
 const ctr=el=>{const r=el.getBoundingClientRect();return {l:r.left-b.left,r:r.right-b.left,t:r.top-b.top,cy:r.top-b.top+r.height/2};};
 let paths="";
 MATCHES.forEach(m=>{
   if(!m.fa) return;
   const me=document.getElementById("card_"+m.id); if(!me) return;
   const c=ctr(me);
   [m.fa,m.fb].forEach(fid=>{
     const fe=document.getElementById("card_"+fid); if(!fe) return;
     const f=ctr(fe); const midX=(f.r+c.l)/2;
     paths+=`<path d="M${f.r} ${f.cy} H${midX} V${c.cy} H${c.l}" fill="none" stroke="var(--line)" stroke-width="2"/>`;
   });
 });
 svg.innerHTML=paths;
}

/* ===== match detail modal ===== */
const EVICON={goal:"⚽",yellow:"🟨",red:"🟥",sub:"🔁"};
function openMatch(id){
 const m=byId(id); if(!m||!m.home||!m.away) return;

// Build the knockout tree from live data. Uses real fixtures per round where the
// API supplies them, and synthesises later-round slots that feed from the previous
// round so winners advance visually. Feeders let resolveBracket() fill empty slots
// (it only fills nulls, never overwriting real teams) and let connectors draw.
function buildKnockout(ko){

 const prov={}; STAGES.forEach(s=>prov[s]=[]);
 ko.forEach(m=>{ if(prov[m.stage]) prov[m.stage].push(m); });
 STAGES.forEach(s=>prov[s].sort((a,b)=>(new Date(a.date||0))-(new Date(b.date||0))||String(a.id||"").localeCompare(String(b.id||""))));
 const built=[], round={};
 STAGES.forEach((st,ri)=>{
   const provided=prov[st];
   const prev=ri? (round[STAGES[ri-1]]||[]) : null;
   const count = ri===0 ? provided.length : Math.max(Math.ceil((prev?prev.length:0)/2), provided.length);
   const arr=[];
   for(let i=0;i<count;i++){
     const p=provided[i];
     const mm = p ? {id:p.id||("ko_"+st+"_"+i), r:ri, home:p.home, away:p.away, hg:p.hg, ag:p.ag,
        status:p.status, date:p.date, minute:p.minute||0,
        maxMin:(["aet","pens"].includes(p.status))?120:90, pens:p.pens?penFromTotals(p.pens):undefined}
       : {id:"slot_"+st+"_"+i, r:ri, home:null, away:null, status:"up", date:""};
     if(ri>0 && prev){ if(prev[2*i]) mm.fa=prev[2*i].id; if(prev[2*i+1]) mm.fb=prev[2*i+1].id; }
     arr.push(mm); built.push(mm);

 });

}
// The API sometimes omits R32 fixtures for teams that qualified. Compute group
// tables from the scored group games, pick qualifiers (top 2 per group + best
// thirds up to 32), and synthesise R32 slots for any qualifier not already in a
// real R32 fixture — so every knockout team appears, assigned or not.
function synthMissingR32(D){
 const groups=D.groups||[]; if(!groups.length) return [];
 const groupOf={}; groups.forEach(g=>(g.teams||[]).forEach(t=>{groupOf[t.country]=g.name;}));
 const tbl={}; const ens=c=>tbl[c]||(tbl[c]={c,group:groupOf[c],pts:0,gd:0,gf:0});
 (D.matches||[]).forEach(m=>{
   if(m.stage!=="group"||m.hg==null||m.ag==null) return;
   if(!(m.status==="ft"||m.status==="aet"||m.status==="pens")) return;
   if(groupOf[m.home]==null||groupOf[m.away]==null) return;
   const H=ens(m.home),A=ens(m.away);
   H.gf+=m.hg;A.gf+=m.ag;H.gd+=m.hg-m.ag;A.gd+=m.ag-m.hg;
   if(m.hg>m.ag)H.pts+=3;else if(m.ag>m.hg)A.pts+=3;else{H.pts++;A.pts++;}
 });
 const byG={}; Object.values(tbl).forEach(t=>{(byG[t.group]=byG[t.group]||[]).push(t);});
 const cmp=(a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||String(a.c).localeCompare(String(b.c));
 const top2=[],thirds=[];
 Object.values(byG).forEach(a=>{a.sort(cmp);if(a[0])top2.push(a[0].c);if(a[1])top2.push(a[1].c);if(a[2])thirds.push(a[2]);});
 thirds.sort(cmp);
 const quals=top2.concat(thirds.slice(0,Math.max(0,32-top2.length)).map(t=>t.c));
 const inR32=new Set(); (D.matches||[]).filter(m=>m.stage==="r32").forEach(m=>{inR32.add(m.home);inR32.add(m.away);});
 const existing=(D.matches||[]).filter(m=>m.stage==="r32").length;
 const left=quals.filter(c=>c&&!inR32.has(c));
 const out=[];
 for(let i=0;i<left.length && out.length<Math.max(0,16-existing);i+=2){
   out.push({stage:"r32",status:"up",date:"",home:left[i],away:left[i+1]||null,hg:null,ag:null});
 }
 return out;
}

function buildOfficialBracket(apiMatches){

 (apiMatches||[]).forEach(m=>{
   if(!m.home||!m.away||m.status==="up") return;
   idx[[_bnorm(m.home),_bnorm(m.away)].sort().join("|")]={home:m.home,away:m.away,hg:m.hg,ag:m.ag,status:m.status,minute:m.minute,pens:m.pens,date:m.date};
 });

 [0,1,2,3,4].forEach(r=>B.filter(b=>b.r===r).forEach(m=>{
   if(m.fa){ const f=m.losers?loserOf:winnerOf; if(m.home==null)m.home=f(bid(m.fa)); if(m.away==null)m.away=f(bid(m.fb)); }
   if(m.home&&m.away){
     const res=idx[[_bnorm(m.home),_bnorm(m.away)].sort().join("|")];
     if(res){ const swap=_bnorm(res.home)!==_bnorm(m.home);
       m.hg=swap?res.ag:res.hg; m.ag=swap?res.hg:res.ag; m.status=res.status; m.minute=res.minute; if(res.date)m.date=res.date;
       if(res.pens){ const t=swap?{home:res.pens.away,away:res.pens.home}:res.pens; m.pens=penFromTotals(t); }
     } else if(!m.status){ m.status="up"; }
   } else if(!m.status){ m.status="up"; }
 }));

}

  try{ const r=await fetch("api/data"); if(r&&r.ok){ const j=await r.json(); if(j&&Array.isArray(j.matches)) window.WC_DATA=j; } }catch(e){}
  _renderAll();
})();
</script>
